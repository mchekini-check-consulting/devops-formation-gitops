apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applicationsets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/juba-touam/devops-formation-gitops.git
    targetRevision: main
    path: applicationsets/
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
