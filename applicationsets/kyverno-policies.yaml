apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    # Source 1 : chart Helm kyverno-policies depuis devops-formation-utils
    - repoURL: https://github.com/mchekini-check-consulting/devops-formation-utils.git
      targetRevision: main
      path: k8s/helm/kyverno-policies/
      helm:
        valueFiles:
          - $values/base/policies/kyverno/values.yaml
    # Source 2 : ref pour $values
    - repoURL: https://github.com/mchekini-check-consulting/devops-formation-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
