apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: microservices
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - name: catalog
                  repo: https://github.com/mchekini-check-consulting/devops-formation-catalog.git
                - name: order
                  repo: https://github.com/mchekini-check-consulting/devops-formation-order.git
                - name: payment
                  repo: https://github.com/mchekini-check-consulting/devops-formation-payment.git
                - name: front
                  repo: https://github.com/mchekini-check-consulting/devops-formation-front.git
          - list:
              elements:
                - env: dev
                  namespace: dev
                - env: qualif
                  namespace: qualif
                - env: prod
                  namespace: prod
  template:
    metadata:
      name: "{{.name}}-{{.env}}"
    spec:
      project: default
      sources:
        - repoURL: "{{.repo}}"
          targetRevision: feat/postgres
          path: helm/
          helm:
            valueFiles:
              - $values/environments/{{.env}}/40-applications/{{.name}}/values.yaml
        - repoURL: https://github.com/mchekini-check-consulting/devops-formation-gitops.git
          targetRevision: feat/postgres
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
