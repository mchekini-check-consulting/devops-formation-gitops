apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-exporter-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-exporter-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: prod/payment
        property: SPRING_DATASOURCE_PASSWORD
