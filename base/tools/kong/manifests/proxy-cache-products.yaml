apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: proxy-cache-products
  namespace: prod
plugin: proxy-cache
config:
  response_code:
    - 200
  request_method:
    - GET
  content_type:
    - application/json
    - application/json; charset=utf-8
  cache_ttl: 120
  strategy: memory
