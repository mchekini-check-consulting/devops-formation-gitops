apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalogue-httproute
  namespace: prod
  annotations:
    konghq.com/plugins: jwt-auth
    konghq.com/strip-path: "false"
spec:
  parentRefs:
    - name: kong-gateway
      namespace: kong
      sectionName: proxy
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: catalogue
          port: 4000
          kind: Service
          weight: 100
        - name: catalogue-canary
          port: 4000
          kind: Service
          weight: 0
