apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kong-jwt-keycloak
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kong-jwt-keycloak
    creationPolicy: Owner
    template:
      metadata:
        labels:
          konghq.com/credential: jwt
      data:
        kongCredType: jwt
        algorithm: RS256
        key: "https://51.11.203.15/realms/formation"
        rsa_public_key: "{{ .rsa_public_key }}"
  data:
    - secretKey: rsa_public_key
      remoteRef:
        key: prod/kong
        property: rsa_public_key
