apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: extract-jwt-sub
  namespace: prod
plugin: pre-function
config:
  access:
    - |
      local jwt = kong.request.get_header("Authorization")
      if jwt then
        jwt = jwt:gsub("Bearer ", "")
        local parts = {}
        for part in jwt:gmatch("[^%.]+") do table.insert(parts, part) end
        if #parts == 3 then
          local b64 = parts[2]
          b64 = b64:gsub("-", "+"):gsub("_", "/")
          local pad = 4 - (#b64 % 4)
          if pad < 4 then b64 = b64 .. string.rep("=", pad) end
          local payload = ngx.decode_base64(b64)
          if payload then
            local cjson = require("cjson.safe")
            local data = cjson.decode(payload)
            if data and data.sub then
              kong.service.request.set_header("X-User-Sub", data.sub)
            end
          end
        end
      end
