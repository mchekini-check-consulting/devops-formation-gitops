apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: extract-jwt-sub
  namespace: prod
plugin: pre-function
config:
  access:
    - |
      local auth = kong.request.get_header("Authorization")
      if auth then
        local token = auth:sub(8)
        local dot1 = token:find("%.")
        if dot1 then
          local dot2 = token:find("%.", dot1 + 1)
          if dot2 then
            local b64 = token:sub(dot1 + 1, dot2 - 1)
            b64 = b64:gsub("-", "+"):gsub("_", "/")
            local rem = #b64 % 4
            if rem == 2 then b64 = b64 .. "=="
            elseif rem == 3 then b64 = b64 .. "="
            end
            local payload = ngx.decode_base64(b64)
            if payload then
              local s, e = payload:find('"sub"%s*:%s*"')
              if s then
                local val_start = e + 1
                local val_end = payload:find('"', val_start)
                if val_end then
                  kong.service.request.set_header("X-User-Sub", payload:sub(val_start, val_end - 1))
                end
              end
            end
          end
        end
      end
