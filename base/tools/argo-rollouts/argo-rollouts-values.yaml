controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

installCRDs: true
clusterInstall: true

providerRBAC:
  providers:
    gatewayAPI: true

dashboard:
  enabled: true
  extraArgs:
    - --namespace=prod
  service:
    type: ClusterIP
    port: 3100
