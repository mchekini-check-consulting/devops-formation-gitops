apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-grafana
  namespace: monitoring
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
