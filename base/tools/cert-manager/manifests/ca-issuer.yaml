apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: formation-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  isCA: true
  commonName: formation-ca
  secretName: formation-ca-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  subject:
    organizations:
      - Formation
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ca:
    secretName: formation-ca-secret
